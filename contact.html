<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Janaki Lakshmi Jasti</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: "Times New Roman", Times, serif; color: #1a1a1a; background-color: #fdfdfd; }
        .navbar { padding: 1.5rem 0; background: white !important; border-bottom: 1px solid #eee; }
        .nav-link { font-size: 1rem; color: #1a1a1a !important; }
        .contact-header { padding: 80px 0 40px; text-align: center; }
        .contact-title { font-size: 3rem; color: #3b2b23; font-weight: 400; margin-bottom: 2rem; }
        .contact-container { max-width: 700px; margin: 0 auto; padding-bottom: 100px; }
        
        .form-control {
            border: none;
            border-bottom: 1px solid #ccc;
            border-radius: 0;
            padding: 1rem 0;
            background: transparent;
            font-size: 1.1rem;
        }
        .form-control:focus { box-shadow: none; border-color: #3b2b23; background: transparent; }
        .form-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #888; margin-top: 2rem; }
        
        .btn-send {
            margin-top: 3rem;
            padding: 15px 60px;
            background-color: #3b2b23;
            color: white;
            border-radius: 50px;
            border: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">JANAKI LAKSHMI JASTI</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto gap-4">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="work.html">Janaki's Work</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">Get to Know Janaki</a></li>
                <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="contact-header">
        <h1 class="contact-title">Contact Me</h1>
    </div>

    <div class="contact-container">
        <form action="https://formspree.io/f/xyzaabbcc" method="POST">
            <div class="row">
                <div class="col-md-6">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="full_name" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="_replyto" class="form-control" required>
                </div>
            </div>

            <div class="mt-4">
                <label class="form-label">Message</label>
                <textarea name="message" class="form-control" rows="4" required></textarea>
            </div>

            <input type="text" name="_gotcha" style="display:none">

            <div class="text-center">
                <button type="submit" class="btn btn-send">Submit Message</button>
            </div>
        </form>
    </div>
</div>

<footer class="py-5 text-center bg-white border-top">
    <p class="text-muted small">© 2026 JANAKI LAKSHMI JASTI</p>
</footer>

</body>
</html>
